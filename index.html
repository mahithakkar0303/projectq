<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ Cloud Cost Calculator - Neon</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(15, 15, 25, 0.95);
            border-radius: 25px;
            box-shadow: 
                0 0 50px rgba(120, 119, 198, 0.3),
                0 0 100px rgba(255, 119, 198, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00f5ff, #ff00ff, transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.9), rgba(255, 119, 198, 0.9));
            color: #fff;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 650px;
        }

        .input-section, .results-section {
            padding: 50px;
        }

        .input-section {
            background: linear-gradient(180deg, rgba(20, 20, 40, 0.8), rgba(10, 10, 25, 0.8));
        }

        .results-section {
            background: linear-gradient(180deg, rgba(10, 10, 25, 0.8), rgba(20, 20, 40, 0.8));
            position: relative;
        }

        .section-title {
            color: #00f5ff;
            font-size: 1.8em;
            margin-bottom: 35px;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            color: #b0b3ff;
            font-weight: 500;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            text-shadow: 0 0 5px rgba(176, 179, 255, 0.3);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            font-size: 16px;
            color: #fff;
            font-family: inherit;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 
                0 0 25px rgba(0, 245, 255, 0.4),
                inset 0 0 20px rgba(0, 245, 255, 0.1);
            transform: scale(1.02);
        }

        .calculate-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(45deg, #ff00ff, #00f5ff);
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .calculate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .calculate-btn:hover::before {
            left: 100%;
        }

        .calculate-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(255, 0, 255, 0.4),
                0 0 60px rgba(0, 245, 255, 0.3);
        }

        .total-cost {
            background: linear-gradient(45deg, #ff0080, #ff6600);
            color: #fff;
            text-align: center;
            padding: 35px;
            border-radius: 25px;
            margin: 25px 0;
            font-size: 2.5em;
            font-weight: 700;
            box-shadow: 
                0 0 50px rgba(255, 0, 128, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cost-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .cost-item {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.2), rgba(255, 119, 198, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .cost-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
        }

        .cost-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(120, 119, 198, 0.3);
        }

        .cost-value {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 15px currentColor;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-top: 40px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .savings-tips {
            background: rgba(0, 255, 127, 0.1);
            border-left: 5px solid #00ff7f;
            padding: 25px;
            margin-top: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .savings-tips h4 {
            color: #00ff7f;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.5);
        }

        .savings-tips ul {
            color: #b0ffb0;
            list-style: none;
        }

        .savings-tips li {
            padding: 8px 0;
            position: relative;
            padding-left: 25px;
        }

        .savings-tips li::before {
            content: '✨';
            position: absolute;
            left: 0;
            color: #00ff7f;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2.2em;
            }
            
            .input-section, .results-section {
                padding: 30px 25px;
            }
        }

        /* Custom Chart Styles */
        #costChart {
            filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.3));
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- SAME HTML STRUCTURE AS BEFORE -->
    <div class="container">
        <div class="header">
            <h1>☁️ Cloud Cost Calculator</h1>
            <p>Neon-powered cloud expense estimator</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <h2 class="section-title">📊 Enter Usage Data</h2>
                
                <div class="input-group">
                    <label>Cloud Provider</label>
                    <select id="provider">
                        <option value="aws">AWS (₹/month)</option>
                        <option value="azure">Azure (₹/month)</option>
                        <option value="gcp">Google Cloud (₹/month)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>🗄️ Storage (GB/month)</label>
                    <input type="number" id="storage" placeholder="Enter GB" min="0" value="100">
                </div>

                <div class="input-group">
                    <label>💻 Compute Hours/month</label>
                    <input type="number" id="compute" placeholder="Enter hours" min="0" value="50">
                </div>

                <div class="input-group">
                    <label>🌐 Data Transfer (GB/month)</label>
                    <input type="number" id="dataTransfer" placeholder="Enter GB" min="0" value="20">
                </div>

                <button class="calculate-btn" onclick="calculateCosts()">🧮 Calculate Costs</button>
            </div>

            <div class="results-section">
                <h2 class="section-title">💰 Results Dashboard</h2>
                
                <div id="totalCost" class="total-cost" style="display: none;">
                    ₹<span id="totalAmount">0</span>/month
                </div>

                <div class="cost-breakdown">
                    <div class="cost-item">
                        <div class="cost-value" id="storageCost">₹0</div>
                        <div>Storage</div>
                    </div>
                    <div class="cost-item">
                        <div class="cost-value" id="computeCost">₹0</div>
                        <div>Compute</div>
                    </div>
                    <div class="cost-item">
                        <div class="cost-value" id="dataCost">₹0</div>
                        <div>Data Transfer</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="costChart"></canvas>
                </div>

                <div id="savingsTips" class="savings-tips" style="display: none;">
                    <h4>💡 Optimization Matrix</h4>
                    <ul>
                        <li>Auto-scaling (40% savings)</li>
                        <li>Delete unused storage</li>
                        <li>Cheaper regions</li>
                        <li>Data compression</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- SAME JAVASCRIPT AS BEFORE -->
    <script>
        let chart = null;

        const pricing = {
            aws: { storage: 2, compute: 10, data: 5 },
            azure: { storage: 2.2, compute: 11, data: 4.8 },
            gcp: { storage: 1.8, compute: 9.5, data: 5.2 }
        };

        function calculateCosts() {
            const provider = document.getElementById('provider').value;
            const storage = parseFloat(document.getElementById('storage').value) || 0;
            const compute = parseFloat(document.getElementById('compute').value) || 0;
            const dataTransfer = parseFloat(document.getElementById('dataTransfer').value) || 0;

            const rates = pricing[provider];
            const storageCost = storage * rates.storage;
            const computeCost = compute * rates.compute;
            const dataCost = dataTransfer * rates.data;
            const totalCost = storageCost + computeCost + dataCost;

            document.getElementById('storageCost').textContent = `₹${storageCost.toFixed(0)}`;
            document.getElementById('computeCost').textContent = `₹${computeCost.toFixed(0)}`;
            document.getElementById('dataCost').textContent = `₹${dataCost.toFixed(0)}`;
            document.getElementById('totalAmount').textContent = totalCost.toFixed(0);
            document.getElementById('totalCost').style.display = 'block';
            document.getElementById('savingsTips').style.display = 'block';

            updateChart([storageCost, computeCost, dataCost], totalCost);
        }

        function updateChart(costs, total) {
            const ctx = document.getElementById('costChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Storage', 'Compute', 'Data Transfer'],
                    datasets: [{
                        data: costs,
                        backgroundColor: ['#7877c6', '#ff77c6', '#00f5ff'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 25,
                                usePointStyle: true,
                                color: '#fff',
                                font: { size: 14 }
                            }
                        }
                    }
                }
            });
        }

        window.onload = calculateCosts;
        document.querySelectorAll('input, select').forEach(input => {
            input.addEventListener('input', calculateCosts);
        });
    </script>
</body>
</html>
